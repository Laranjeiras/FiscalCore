
name: Pack Dominio + Push no NuGet

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pack-push:
    env:
      PROJECT_PATH: ./FiscalCore/FiscalCore.csproj

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup FiscalCore
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.x

    - name: Packet generator
      run: dotnet pack ${{ env.PROJECT_PATH }} -c Release -o out

    - name: Push to NuGet
      run: |
        cd out
        dotnet nuget push *.nupkg --api-key ${{ secrets.FISCALCORE_API_KEY }} --source ${{ secrets.NUGET_SERVER }} --skip-duplicate
